<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Track Order - Chakki Wala</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: {
                    "primary": "#803d0a",
                    "surface": "#fafaf5",
                    "on-surface": "#1a1c19",
                    "surface-container-lowest": "#ffffff",
                    "surface-container-high": "#e8e8e3",
                    "secondary-container": "#f4ddb2",
                    "on-surface-variant": "#54433c",
                    "success": "#2e7d32",
                    "error": "#ba1a1a",
                    "warning": "#ff9800",
                    "info": "#2196f3",
                },
                fontFamily: {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Manrope"],
                },
            },
        },
    }
</script>
<style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .toast-notification {
        position: fixed;
        bottom: 100px;
        left: 50%;
        transform: translateX(-50%);
        background: #1a1c19;
        color: white;
        padding: 12px 24px;
        border-radius: 50px;
        font-size: 14px;
        font-weight: bold;
        z-index: 1000;
        opacity: 0;
        transition: opacity 0.3s;
        pointer-events: none;
    }
    .step-complete .step-circle {
        background-color: #2e7d32;
        border-color: #2e7d32;
        color: white;
    }
    .step-active .step-circle {
        background-color: #803d0a;
        border-color: #803d0a;
        color: white;
        animation: pulse 1.5s infinite;
    }
    .step-pending .step-circle {
        background-color: #e8e8e3;
        border-color: #dac1b8;
        color: #87736b;
    }
    @keyframes pulse {
        0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(128,61,10,0.4); }
        50% { transform: scale(1.05); box-shadow: 0 0 0 8px rgba(128,61,10,0); }
    }
    .loading-spinner {
        display: inline-block;
        width: 20px;
        height: 20px;
        border: 2px solid #fff;
        border-radius: 50%;
        border-top-color: transparent;
        animation: spin 0.6s linear infinite;
    }
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
</style>
</head>
<body class="bg-surface text-on-surface antialiased pb-32">

<div class="toast-notification"></div>

<header class="fixed top-0 w-full z-50 bg-[#fafaf5]/70 backdrop-blur-xl shadow-sm h-16 flex items-center justify-between px-6">
<div class="flex items-center gap-4">
<button class="material-symbols-outlined text-primary hover:bg-surface-container transition-colors duration-200 p-2 rounded-full active:scale-95" onclick="goBack()">arrow_back</button>
<h1 class="font-['Plus_Jakarta_Sans'] font-bold tracking-tight text-xl text-primary">Track Order</h1>
</div>
<div class="text-sm font-bold text-on-surface-variant" id="orderIdDisplay">#CKW-XXXXXX</div>
</header>

<main class="pt-20 px-6 max-w-2xl mx-auto space-y-6">
<!-- Order Status Header -->
<section class="bg-surface-container-lowest rounded-2xl p-6 shadow-sm">
<div class="flex justify-between items-start mb-4">
<div>
<p class="text-xs font-bold uppercase tracking-widest text-on-surface-variant">Order Status</p>
<p class="text-2xl font-extrabold text-primary" id="orderStatusText">Loading...</p>
</div>
<div class="text-right">
<p class="text-xs text-on-surface-variant">Order Date</p>
<p class="text-sm font-semibold" id="orderDate">-</p>
</div>
</div>
<div class="w-full bg-surface-container-high rounded-full h-2 mb-2 overflow-hidden">
<div id="progressBar" class="h-full rounded-full transition-all duration-500" style="width: 0%; background-color: #803d0a;"></div>
</div>
<div class="flex justify-between text-xs text-on-surface-variant">
<span>Confirmed</span>
<span>Processing</span>
<span>Out for Delivery</span>
<span>Delivered</span>
</div>
</section>

<!-- Stepper Timeline -->
<section class="bg-surface-container-lowest rounded-2xl p-6 shadow-sm">
<h3 class="font-headline font-bold text-lg mb-6">Order Timeline</h3>
<div class="relative">
<div class="absolute left-6 top-8 bottom-8 w-0.5 bg-outline-variant/50" id="timelineLine"></div>
<div class="space-y-8" id="timelineSteps"></div>
</div>
</section>

<!-- Delivery Info -->
<section class="grid grid-cols-1 gap-4">
<div class="bg-surface-container-low rounded-xl p-4 flex gap-3">
<div class="bg-secondary-container w-10 h-10 rounded-full flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-primary">location_on</span>
</div>
<div>
<p class="text-xs font-bold uppercase tracking-wider text-on-surface-variant">Delivery Address</p>
<p class="text-sm text-on-surface font-medium" id="deliveryAddress">-</p>
</div>
</div>
<div class="bg-surface-container-low rounded-xl p-4 flex gap-3">
<div class="bg-secondary-container w-10 h-10 rounded-full flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-primary">schedule</span>
</div>
<div>
<p class="text-xs font-bold uppercase tracking-wider text-on-surface-variant">Delivery Slot</p>
<p class="text-sm text-on-surface font-medium" id="deliverySlot">-</p>
</div>
</div>
</section>

<!-- Order Items -->
<section class="bg-surface-container-lowest rounded-2xl p-6 shadow-sm">
<h3 class="font-headline font-bold text-lg mb-4">Order Items</h3>
<div id="orderItems" class="space-y-3"></div>
<div class="h-px bg-outline-variant/20 my-4"></div>
<div class="flex justify-between items-center">
<span class="font-bold">Total Amount</span>
<span class="text-2xl font-extrabold text-primary" id="totalAmount">₹0</span>
</div>
</section>

<!-- Action Buttons -->
<section class="flex gap-3 pb-8">
<button class="flex-1 bg-primary text-white py-3 rounded-xl font-bold shadow-md active:scale-95 transition-all flex items-center justify-center gap-2" onclick="reorder()">
<span class="material-symbols-outlined">refresh</span> Reorder
</button>
<button class="flex-1 border-2 border-primary/30 text-primary py-3 rounded-xl font-bold active:scale-95 transition-all flex items-center justify-center gap-2" onclick="contactSupport()">
<span class="material-symbols-outlined">support_agent</span> Support
</button>
</section>
</main>

<script>
// ==================== CONFIGURATION ====================
const API_BASE_URL = 'http://localhost:3000/api';
let currentSessionId = localStorage.getItem('sessionId');
let orderId = null;
let orderData = null;

// ==================== HELPER FUNCTIONS ====================
function showToast(message, isError = false) {
    let toast = document.querySelector('.toast-notification');
    toast.textContent = message;
    toast.style.background = isError ? '#ba1a1a' : '#2e7d32';
    toast.style.opacity = '1';
    setTimeout(() => {
        toast.style.opacity = '0';
    }, 3000);
}

function goBack() {
    window.location.href = 'Order-success.html';
}

function reorder() {
    showToast('Reorder feature coming soon!');
}

function contactSupport() {
    window.open('https://wa.me/919876543210', '_blank');
}

// ==================== STATUS HELPER ====================
function getStatusStep(status) {
    switch(status) {
        case 'Confirmed': return 1;
        case 'Processing': return 2;
        case 'In Process': return 2;
        case 'In Delivery': return 3;
        case 'Delivered': return 4;
        case 'Cancelled': return 0;
        default: return 1;
    }
}

function getStatusColor(status) {
    switch(status) {
        case 'Confirmed': return '#2e7d32';
        case 'Processing': return '#ff9800';
        case 'In Process': return '#ff9800';
        case 'In Delivery': return '#2196f3';
        case 'Delivered': return '#2e7d32';
        case 'Cancelled': return '#ba1a1a';
        default: return '#803d0a';
    }
}

function getStatusIcon(status) {
    switch(status) {
        case 'Confirmed': return 'check_circle';
        case 'Processing': return 'settings';
        case 'In Process': return 'settings';
        case 'In Delivery': return 'local_shipping';
        case 'Delivered': return 'check_circle';
        case 'Cancelled': return 'cancel';
        default: return 'check_circle';
    }
}

// ==================== RENDER TIMELINE ====================
function renderTimeline(currentStatus) {
    const steps = [
        { name: 'Order Confirmed', key: 'Confirmed', icon: 'check_circle', description: 'Your order has been confirmed' },
        { name: 'Processing', key: 'Processing', icon: 'settings', description: 'Order is being prepared' },
        { name: 'Out for Delivery', key: 'In Delivery', icon: 'local_shipping', description: 'Order is out for delivery' },
        { name: 'Delivered', key: 'Delivered', icon: 'check_circle', description: 'Order has been delivered' }
    ];
    
    const currentStep = getStatusStep(currentStatus);
    const isCancelled = currentStatus === 'Cancelled';
    
    const container = document.getElementById('timelineSteps');
    const timelineLine = document.getElementById('timelineLine');
    
    if (isCancelled) {
        container.innerHTML = `
            <div class="flex items-start gap-4">
                <div class="relative">
                    <div class="w-12 h-12 rounded-full bg-error/20 flex items-center justify-center border-2 border-error">
                        <span class="material-symbols-outlined text-error">cancel</span>
                    </div>
                </div>
                <div class="flex-1 pb-4">
                    <h4 class="font-bold text-error">Order Cancelled</h4>
                    <p class="text-sm text-on-surface-variant">Your order has been cancelled. Refund will be processed within 5-7 business days.</p>
                </div>
            </div>
        `;
        timelineLine.style.display = 'none';
        return;
    }
    
    timelineLine.style.display = 'block';
    
    container.innerHTML = steps.map((step, index) => {
        let stepClass = 'step-pending';
        let statusText = '';
        
        if (index + 1 <= currentStep) {
            stepClass = 'step-complete';
            statusText = 'Completed';
        } else if (index + 1 === currentStep + 1 && currentStep < 4) {
            stepClass = 'step-active';
            statusText = 'In Progress';
        } else {
            stepClass = 'step-pending';
            statusText = 'Pending';
        }
        
        return `
            <div class="flex items-start gap-4 relative">
                <div class="relative">
                    <div class="w-12 h-12 rounded-full flex items-center justify-center border-2 transition-all ${stepClass === 'step-complete' ? 'bg-success border-success' : stepClass === 'step-active' ? 'bg-primary border-primary step-circle' : 'bg-surface-container-high border-outline-variant'}">
                        <span class="material-symbols-outlined text-lg ${stepClass === 'step-complete' ? 'text-white' : stepClass === 'step-active' ? 'text-white' : 'text-outline'}">${step.icon}</span>
                    </div>
                    ${index < steps.length - 1 ? `<div class="absolute top-12 left-6 w-0.5 h-12 ${index + 1 < currentStep ? 'bg-success' : 'bg-outline-variant/50'}"></div>` : ''}
                </div>
                <div class="flex-1 pb-8">
                    <div class="flex items-center justify-between">
                        <h4 class="font-bold ${stepClass === 'step-active' ? 'text-primary' : stepClass === 'step-complete' ? 'text-success' : 'text-on-surface-variant'}">${step.name}</h4>
                        <span class="text-xs ${stepClass === 'step-complete' ? 'text-success' : stepClass === 'step-active' ? 'text-primary' : 'text-outline'}">${statusText}</span>
                    </div>
                    <p class="text-sm text-on-surface-variant mt-1">${step.description}</p>
                </div>
            </div>
        `;
    }).join('');
}

// ==================== LOAD ORDER DETAILS ====================
async function loadOrderDetails() {
    // Get orderId from URL or localStorage
    const urlParams = new URLSearchParams(window.location.search);
    orderId = urlParams.get('orderId') || localStorage.getItem('lastOrderId');
    
    if (!orderId) {
        showToast('No order found', true);
        setTimeout(() => {
            window.location.href = 'Order_history.html';
        }, 1500);
        return;
    }
    
    document.getElementById('orderIdDisplay').innerHTML = `#${orderId}`;
    
    try {
        const response = await fetch(`${API_BASE_URL}/order/${orderId}`);
        const data = await response.json();
        
        if (data.success) {
            orderData = data.order;
            displayOrderDetails();
        } else {
            showToast('Error loading order details', true);
        }
    } catch (error) {
        console.error('Error loading order:', error);
        showToast('Network error. Please try again.', true);
    }
}

function displayOrderDetails() {
    if (!orderData) return;
    
    const status = orderData.orderStatus;
    const statusStep = getStatusStep(status);
    const progressPercent = (statusStep / 4) * 100;
    
    document.getElementById('orderStatusText').innerHTML = status;
    document.getElementById('orderDate').innerHTML = new Date(orderData.orderDate).toLocaleDateString();
    document.getElementById('progressBar').style.width = `${progressPercent}%`;
    document.getElementById('progressBar').style.backgroundColor = getStatusColor(status);
    document.getElementById('deliveryAddress').innerHTML = orderData.address || 'Address not available';
    document.getElementById('deliverySlot').innerHTML = orderData.deliverySlot || 'Slot not selected';
    document.getElementById('totalAmount').innerHTML = `₹${orderData.orderTotal?.toFixed(2) || 0}`;
    
    renderTimeline(status);
    
    // Render order items
    const itemsContainer = document.getElementById('orderItems');
    if (orderData.items && orderData.items.length > 0) {
        itemsContainer.innerHTML = orderData.items.map(item => `
            <div class="flex items-center justify-between py-2">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-surface-container-high rounded-lg flex items-center justify-center">
                        <span class="material-symbols-outlined text-primary text-xl">bakery_dining</span>
                    </div>
                    <div>
                        <p class="font-medium text-sm">${item.name}</p>
                        <p class="text-xs text-on-surface-variant">${item.weight} × ${item.quantity}</p>
                    </div>
                </div>
                <span class="font-bold text-primary">₹${item.itemTotal}</span>
            </div>
        `).join('');
    }
}

// ==================== POLL ORDER STATUS ====================
async function pollOrderStatus() {
    if (!orderId) return;
    
    try {
        const response = await fetch(`${API_BASE_URL}/order/${orderId}`);
        const data = await response.json();
        
        if (data.success && data.order.orderStatus !== orderData?.orderStatus) {
            orderData = data.order;
            displayOrderDetails();
            showToast(`Order status updated to: ${orderData.orderStatus}`, false);
        }
    } catch (error) {
        console.error('Status poll error:', error);
    }
}

// ==================== INITIALIZE ====================
async function init() {
    await loadOrderDetails();
    
    // Poll for status updates every 30 seconds
    setInterval(pollOrderStatus, 30000);
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
