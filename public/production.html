<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chakki Walaa - Production Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background: #f3f4f6; }
        .notification-toast { position: fixed; top: 20px; right: 20px; background: #16a34a; color: white; padding: 12px 24px; border-radius: 12px; z-index: 1000; display: none; align-items: center; gap: 10px; font-weight: 600; }
        .status-Processing { background: #fef3c7; color: #92400e; }
        .status-Process-Started { background: #dbeafe; color: #1e40af; }
        .status-Ready-for-Delivery { background: #d1fae5; color: #065f46; }
        .order-card { transition: all 0.2s ease; }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body class="bg-gray-100">

<div id="notificationToast" class="notification-toast">
    <span>🔔</span>
    <span id="toastMessage">Status updated!</span>
</div>

<div class="container mx-auto px-4 py-6 max-w-5xl">

    <!-- Login Box -->
    <div id="loginBox" class="bg-white rounded-2xl shadow-lg p-8 max-w-md mx-auto mt-20">
        <div class="text-center mb-6">
            <div class="text-5xl mb-3">🏭</div>
            <h2 class="text-2xl font-bold text-gray-800">Production Panel</h2>
            <p class="text-gray-500 text-sm mt-1">Chakki Walaa Floor Operations</p>
        </div>
        <form onsubmit="event.preventDefault(); login()">
            <input type="password" id="productionPassword" placeholder="Enter Production Password"
                class="w-full p-3 border rounded-xl mb-4" autocomplete="new-password">
            <button type="submit" class="w-full bg-amber-800 text-white py-3 rounded-xl font-semibold hover:bg-amber-900">
                Login to Production
            </button>
        </form>
        <div id="loginError" class="text-red-500 text-sm mt-3 text-center hidden"></div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" style="display:none;">
        <div class="flex justify-between items-center mb-6 flex-wrap gap-3">
            <div>
                <h1 class="text-3xl font-bold text-amber-800">🏭 Production Floor</h1>
                <p class="text-gray-500 text-sm">Manage flour grinding & order preparation</p>
            </div>
            <div class="flex gap-3">
                <button onclick="loadOrders()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-semibold">🔄 Refresh</button>
                <button onclick="logout()" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg text-sm font-semibold">🚪 Logout</button>
            </div>
        </div>

        <!-- Stats -->
        <div class="grid grid-cols-3 gap-4 mb-6">
            <div class="bg-yellow-50 border-l-4 border-yellow-500 rounded-xl p-4 shadow-sm">
                <p class="text-xs text-gray-500">Pending</p>
                <p class="text-2xl font-bold text-yellow-600" id="statPending">0</p>
                <p class="text-xs text-gray-400">Awaiting start</p>
            </div>
            <div class="bg-blue-50 border-l-4 border-blue-500 rounded-xl p-4 shadow-sm">
                <p class="text-xs text-gray-500">In Progress</p>
                <p class="text-2xl font-bold text-blue-600" id="statInProgress">0</p>
                <p class="text-xs text-gray-400">Being processed</p>
            </div>
            <div class="bg-green-50 border-l-4 border-green-500 rounded-xl p-4 shadow-sm">
                <p class="text-xs text-gray-500">Ready</p>
                <p class="text-2xl font-bold text-green-600" id="statReady">0</p>
                <p class="text-xs text-gray-400">Ready for delivery</p>
            </div>
        </div>

        <!-- Filter Tabs -->
        <div class="flex gap-2 mb-6 flex-wrap">
            <button onclick="filterOrders('all')" id="tab-all" class="bg-amber-800 text-white px-4 py-2 rounded-full text-sm font-semibold">All Orders</button>
            <button onclick="filterOrders('Processing')" id="tab-Processing" class="bg-gray-200 text-gray-600 px-4 py-2 rounded-full text-sm font-semibold">⏳ Pending</button>
            <button onclick="filterOrders('Process Started')" id="tab-Process-Started" class="bg-gray-200 text-gray-600 px-4 py-2 rounded-full text-sm font-semibold">⚙️ In Progress</button>
            <button onclick="filterOrders('Ready for Delivery')" id="tab-Ready-for-Delivery" class="bg-gray-200 text-gray-600 px-4 py-2 rounded-full text-sm font-semibold">✅ Ready</button>
        </div>

        <div id="ordersList" class="space-y-4"></div>
    </div>
</div>

<script>
    const API_URL = 'https://api.chakkiwalaa.com/api';
    let productionKey = null;
    let allOrders = [];
    let currentFilter = 'all';
    let previousOrderCount = 0;
    let refreshInterval = null;

    async function login() {
        const password = document.getElementById('productionPassword').value;
        if (password !== 'chakki@production2024') {
            document.getElementById('loginError').innerText = 'Invalid password';
            document.getElementById('loginError').classList.remove('hidden');
            return;
        }
        productionKey = password;
        document.getElementById('loginBox').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        await loadOrders();
        startAutoRefresh();
    }

    async function loadOrders() {
        if (!productionKey) return;
        try {
            const response = await fetch(`${API_URL}/production/orders`, {
                headers: { 'X-Production-Key': productionKey }
            });
            const data = await response.json();
            if (data.success) {
                const newCount = data.orders?.length || 0;
                if (previousOrderCount > 0 && newCount > previousOrderCount) {
                    showNotification('📦 New order arrived on production floor!');
                }
                previousOrderCount = newCount;
                allOrders = data.orders || [];
                updateStats();
                renderOrders();
            }
        } catch (error) {
            console.error('Error loading orders:', error);
        }
    }

    function updateStats() {
        document.getElementById('statPending').innerText = allOrders.filter(o => o.order_status === 'Processing').length;
        document.getElementById('statInProgress').innerText = allOrders.filter(o => o.order_status === 'Process Started').length;
        document.getElementById('statReady').innerText = allOrders.filter(o => o.order_status === 'Ready for Delivery').length;
    }

    function filterOrders(status) {
        currentFilter = status;
        const tabs = ['all', 'Processing', 'Process Started', 'Ready for Delivery'];
        tabs.forEach(tab => {
            const id = `tab-${tab.replace(/ /g, '-')}`;
            const btn = document.getElementById(id);
            if (btn) {
                btn.className = (tab === status || (status === 'all' && tab === 'all'))
                    ? 'bg-amber-800 text-white px-4 py-2 rounded-full text-sm font-semibold'
                    : 'bg-gray-200 text-gray-600 px-4 py-2 rounded-full text-sm font-semibold';
            }
        });
        renderOrders();
    }

    function getFilteredOrders() {
        if (currentFilter === 'all') return allOrders;
        return allOrders.filter(o => o.order_status === currentFilter);
    }

    async function updateStatus(orderId, newStatus) {
        try {
            const response = await fetch(`${API_URL}/production/update-status`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Production-Key': productionKey
                },
                body: JSON.stringify({ orderId, status: newStatus })
            });
            const data = await response.json();
            if (data.success) {
                showNotification(`✅ Order ${orderId} → ${newStatus}`);
                await loadOrders();
            } else {
                alert('Failed to update status');
            }
        } catch (error) {
            alert('Error: ' + error.message);
        }
    }

    function renderOrders() {
        const container = document.getElementById('ordersList');
        const filtered = getFilteredOrders();

        if (filtered.length === 0) {
            container.innerHTML = `
                <div class="text-center py-16 bg-white rounded-xl">
                    <div class="text-5xl mb-3">✅</div>
                    <p class="text-gray-500 font-semibold">No orders in this category</p>
                </div>`;
            return;
        }

        container.innerHTML = filtered.map(order => {
            const statusClass = `status-${order.order_status?.replace(/ /g, '-')}`;
            const items = Array.isArray(order.items) ? order.items : [];
            const isPending = order.order_status === 'Processing';
            const isInProgress = order.order_status === 'Process Started';
            const isReady = order.order_status === 'Ready for Delivery';

            const itemsHtml = items.map(item => `
                <div class="flex justify-between items-center py-2 border-b last:border-0">
                    <div>
                        <p class="font-semibold text-gray-800">${item.product_name}</p>
                        <p class="text-xs text-gray-500">${item.weight}</p>
                    </div>
                    <div class="text-right">
                        <p class="font-bold text-lg text-amber-800">×${item.quantity}</p>
                        <p class="text-xs text-gray-500">₹${item.price * item.quantity}</p>
                    </div>
                </div>
            `).join('');

            return `
                <div class="order-card bg-white rounded-xl shadow-sm overflow-hidden border-l-4 ${isPending ? 'border-yellow-400' : isInProgress ? 'border-blue-400' : 'border-green-400'}">
                    <div class="p-5">
                        <div class="flex justify-between items-start mb-4 flex-wrap gap-3">
                            <div>
                                <p class="text-xs text-gray-500">Order ID</p>
                                <p class="font-mono font-bold text-lg">${order.order_id}</p>
                                <p class="text-xs text-gray-500 mt-1">⏰ ${order.order_date} ${order.order_time}</p>
                            </div>
                            <span class="px-3 py-1 rounded-full text-sm font-semibold ${statusClass}">
                                ${isPending ? '⏳ Pending' : isInProgress ? '⚙️ In Progress' : '✅ Ready'}
                            </span>
                        </div>

                        <div class="grid grid-cols-2 gap-4 mb-4">
                            <div class="bg-gray-50 rounded-lg p-3">
                                <p class="text-xs text-gray-500">Customer</p>
                                <p class="font-semibold">${order.customer_name || 'N/A'}</p>
                                <p class="text-sm text-gray-600">📞 ${order.customer_mobile || 'N/A'}</p>
                            </div>
                            <div class="bg-gray-50 rounded-lg p-3">
                                <p class="text-xs text-gray-500">Delivery Slot</p>
                                <p class="font-semibold text-sm">${order.delivery_slot || 'N/A'}</p>
                                <p class="text-xs text-gray-500 mt-1">${order.payment_method?.toUpperCase() || 'COD'}</p>
                            </div>
                        </div>

                        <div class="bg-amber-50 rounded-lg p-3 mb-4">
                            <p class="text-xs font-semibold text-amber-800 mb-2">📦 ITEMS TO GRIND</p>
                            ${itemsHtml}
                        </div>

                        <div class="flex gap-3">
                            ${isPending ? `
                                <button onclick="updateStatus('${order.order_id}', 'Process Started')"
                                    class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-bold transition active:scale-95">
                                    ⚙️ Start Production
                                </button>
                            ` : ''}
                            ${isInProgress ? `
                                <button onclick="updateStatus('${order.order_id}', 'Ready for Delivery')"
                                    class="flex-1 bg-green-600 hover:bg-green-700 text-white py-3 rounded-xl font-bold transition active:scale-95">
                                    ✅ Ready for Delivery
                                </button>
                            ` : ''}
                            ${isReady ? `
                                <div class="flex-1 bg-green-100 text-green-700 py-3 rounded-xl font-bold text-center">
                                    ✅ Awaiting Pickup
                                </div>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function showNotification(message) {
        const toast = document.getElementById('notificationToast');
        document.getElementById('toastMessage').innerText = message;
        toast.style.display = 'flex';
        setTimeout(() => { toast.style.display = 'none'; }, 4000);
    }

    function startAutoRefresh() {
        if (refreshInterval) clearInterval(refreshInterval);
        refreshInterval = setInterval(() => { if (productionKey) loadOrders(); }, 10000);
    }

    function logout() {
        if (refreshInterval) clearInterval(refreshInterval);
        productionKey = null;
        allOrders = [];
        previousOrderCount = 0;
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('loginBox').style.display = 'block';
        document.getElementById('productionPassword').value = '';
    }
</script>
</body>
</html>
