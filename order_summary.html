<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Order Summary - Chakki Wala</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: {
                    "primary": "#803d0a",
                    "surface": "#fafaf5",
                    "on-surface": "#1a1c19",
                    "surface-container-lowest": "#ffffff",
                    "surface-container-high": "#e8e8e3",
                    "secondary-container": "#f4ddb2",
                    "on-surface-variant": "#54433c",
                    "outline-variant": "#dac1b8",
                    "error": "#ba1a1a",
                    "success": "#2e7d32",
                },
                fontFamily: {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Manrope"],
                },
            },
        },
    }
</script>
<style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .toast-notification {
        position: fixed;
        bottom: 100px;
        left: 50%;
        transform: translateX(-50%);
        background: #1a1c19;
        color: white;
        padding: 12px 24px;
        border-radius: 50px;
        font-size: 14px;
        font-weight: bold;
        z-index: 1000;
        opacity: 0;
        transition: opacity 0.3s;
        pointer-events: none;
    }
</style>
</head>
<body class="bg-surface text-on-surface min-h-screen pb-32">

<div class="toast-notification"></div>

<header class="fixed top-0 left-0 w-full z-50 flex items-center px-4 h-16 bg-[#fafaf5]/80 backdrop-blur-md shadow-sm">
<button class="p-2 hover:opacity-80 transition-opacity active:scale-95 duration-200" onclick="goBack()">
<span class="material-symbols-outlined text-[#803d0a]">arrow_back</span>
</button>
<h1 class="ml-2 font-['Plus_Jakarta_Sans'] tracking-tight font-bold text-[#54433c] text-lg">Order Summary</h1>
</header>

<main class="mt-20 px-4 space-y-6 max-w-lg mx-auto">
<!-- Items Section -->
<section>
<h2 class="text-on-surface-variant font-bold text-sm uppercase tracking-widest mb-3 px-1">Items in Cart</h2>
<div class="bg-surface-container-lowest rounded-xl shadow-sm overflow-hidden" id="itemsContainer"></div>
</section>

<!-- Delivery Details -->
<section class="grid grid-cols-1 gap-4">
<h2 class="text-on-surface-variant font-bold text-sm uppercase tracking-widest mb-1 px-1">Delivery Info</h2>
<div class="bg-surface-container-low rounded-xl p-4 flex gap-4 items-start">
<div class="bg-secondary-container p-2 rounded-full">
<span class="material-symbols-outlined text-on-secondary-container">location_on</span>
</div>
<div>
<h3 class="font-bold text-on-surface text-sm">Shipping Address</h3>
<p class="text-sm text-on-surface-variant mt-1 leading-relaxed" id="addressDisplay">Loading...</p>
</div>
</div>
<div class="bg-surface-container-low rounded-xl p-4 flex gap-4 items-center">
<div class="bg-secondary-container p-2 rounded-full">
<span class="material-symbols-outlined text-on-secondary-container">schedule</span>
</div>
<div>
<h3 class="font-bold text-on-surface text-sm">Delivery Slot</h3>
<p class="text-sm text-on-surface-variant" id="slotDisplay">Loading...</p>
</div>
</div>
</section>

<!-- Payment Summary -->
<section>
<h2 class="text-on-surface-variant font-bold text-sm uppercase tracking-widest mb-3 px-1">Payment Summary</h2>
<div class="bg-surface-container-lowest rounded-xl shadow-sm p-6 space-y-4">
<div class="flex justify-between items-center text-on-surface-variant">
<span>Subtotal</span>
<span id="subtotal">₹0</span>
</div>
<div class="flex justify-between items-center text-on-surface-variant">
<span>Delivery Fee</span>
<span id="deliveryFee">₹0</span>
</div>
<div class="flex justify-between items-center text-on-surface-variant">
<div class="flex items-center gap-1">
<span>GST (5%)</span>
</div>
<span id="gst">₹0</span>
</div>
<div class="pt-4 mt-2 border-t border-surface-variant/50">
<div class="flex justify-between items-end">
<div>
<p class="text-xs font-bold text-on-surface-variant uppercase tracking-tighter">Amount to Pay</p>
<h3 class="text-3xl font-extrabold text-primary tracking-tight" id="total">₹0</h3>
</div>
</div>
</div>
</div>
</section>
</main>

<footer class="fixed bottom-0 left-0 w-full z-50 p-6 flex flex-col items-center bg-[#fafaf5]/90 backdrop-blur-lg rounded-t-[1.5rem] shadow-[0_-10px_30px_rgba(50,18,0,0.06)]">
<button class="flex w-full items-center justify-center gap-2 bg-gradient-to-br from-primary to-primary-container text-white py-4 px-8 rounded-full shadow-lg hover:brightness-110 transition-all active:scale-[0.98] duration-150" id="proceedBtn">
<span class="font-['Plus_Jakarta_Sans'] font-bold text-lg">Proceed to Payment</span>
<span class="material-symbols-outlined">payments</span>
</button>
</footer>

<script>
// ==================== CONFIGURATION ====================
let cartItems = [];
let subtotal = 0;
let deliveryFee = 0;
let gst = 0;
let total = 0;

function showToast(message) {
    let toast = document.querySelector('.toast-notification');
    toast.textContent = message;
    toast.style.opacity = '1';
    setTimeout(() => {
        toast.style.opacity = '0';
    }, 2000);
}

function goBack() {
    window.location.href = 'Mycart.html';
}

// Load cart from localStorage
function loadCart() {
    cartItems = JSON.parse(localStorage.getItem('cart') || '[]');
    if (cartItems.length === 0) {
        showToast('Your cart is empty');
        setTimeout(() => {
            window.location.href = 'Index.html';
        }, 1500);
        return;
    }
    renderItems();
    calculateTotals();
}

function renderItems() {
    const container = document.getElementById('itemsContainer');
    container.innerHTML = `
        <div class="p-4 space-y-4">
            ${cartItems.map(item => `
                <div class="flex items-center gap-4">
                    <div class="w-16 h-16 rounded-lg bg-surface-container overflow-hidden flex-shrink-0 flex items-center justify-center">
                        <span class="material-symbols-outlined text-3xl text-primary">bakery_dining</span>
                    </div>
                    <div class="flex-grow">
                        <h3 class="font-bold text-on-surface">${item.name}</h3>
                        <p class="text-sm text-on-surface-variant">${item.weight} • Qty: ${item.quantity}</p>
                    </div>
                    <div class="text-right">
                        <span class="font-bold text-primary">₹${item.price * item.quantity}</span>
                    </div>
                </div>
                ${cartItems.indexOf(item) < cartItems.length - 1 ? '<div class="h-[1px] bg-surface-variant/30 w-full"></div>' : ''}
            `).join('')}
        </div>
    `;
}

function calculateTotals() {
    subtotal = cartItems.reduce((sum, item) => sum + (item.price * item.quantity), 0);
    deliveryFee = subtotal >= 500 ? 0 : 40;
    gst = subtotal * 0.05;
    total = subtotal + deliveryFee + gst;
    
    document.getElementById('subtotal').innerHTML = `₹${subtotal.toFixed(2)}`;
    document.getElementById('deliveryFee').innerHTML = deliveryFee === 0 ? 'FREE' : `₹${deliveryFee.toFixed(2)}`;
    document.getElementById('gst').innerHTML = `₹${gst.toFixed(2)}`;
    document.getElementById('total').innerHTML = `₹${total.toFixed(2)}`;
}

function loadAddressAndSlot() {
    const address = localStorage.getItem('selectedAddress');
    const addressLabel = localStorage.getItem('selectedAddressLabel');
    const slot = localStorage.getItem('selectedSlot');
    
    if (addressLabel) {
        document.getElementById('addressDisplay').innerHTML = `${addressLabel}<br>${address?.substring(0, 60)}...`;
    } else if (address) {
        document.getElementById('addressDisplay').innerHTML = address;
    } else {
        document.getElementById('addressDisplay').innerHTML = 'No address selected';
    }
    
    if (slot) {
        document.getElementById('slotDisplay').innerHTML = slot;
    } else {
        document.getElementById('slotDisplay').innerHTML = 'No slot selected';
    }
}

function proceedToPayment() {
    const address = localStorage.getItem('selectedAddress');
    const slot = localStorage.getItem('selectedSlot');
    
    if (!address) {
        showToast('Please add delivery address first');
        setTimeout(() => {
            window.location.href = 'edit_address.html';
        }, 1000);
        return;
    }
    
    if (!slot) {
        showToast('Please select delivery slot first');
        setTimeout(() => {
            window.location.href = 'delivery_slot.html';
        }, 1000);
        return;
    }
    
    // Save order summary data
    localStorage.setItem('orderSummary', JSON.stringify({
        items: cartItems,
        subtotal: subtotal,
        deliveryFee: deliveryFee,
        gst: gst,
        total: total,
        address: address,
        slot: slot
    }));
    
    window.location.href = 'payment.html';
}

// Initialize
function init() {
    loadCart();
    loadAddressAndSlot();
    document.getElementById('proceedBtn').addEventListener('click', proceedToPayment);
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
